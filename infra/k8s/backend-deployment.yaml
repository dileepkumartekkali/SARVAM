# STUB — not production-ready. Missing: resource limits, HPA, probes tuned for
# long-lived WebSocket sessions, connection-draining rollout (S2S plan §7).
apiVersion: apps/v1
kind: Deployment
metadata:
  name: maav-backend
  labels:
    app: maav-backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: maav-backend
  template:
    metadata:
      labels:
        app: maav-backend
    spec:
      containers:
        - name: backend
          image: maav-backend:latest # replace with registry ref
          ports:
            - containerPort: 8000
          env:
            - name: REDIS_URL
              value: redis://redis:6379/0
            - name: POSTGRES_DSN
              value: postgresql://maav:maav@postgres:5432/maav
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
---
apiVersion: v1
kind: Service
metadata:
  name: maav-backend
spec:
  selector:
    app: maav-backend
  ports:
    - port: 80
      targetPort: 8000
