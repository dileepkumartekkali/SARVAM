# Local dev boot: backend + speech-gateway + redis + postgres.
# `docker-compose up` should start all four; backend serves GET /health on
# :9000, the speech gateway on :9100. Neither needs Sarvam/Azure keys to boot
# — they're only read when a call is actually made.
services:
  backend:
    build: ./backend
    ports:
      - "9000:9000"
    environment:
      # Consumed once the checkpointer/session store is wired (later phase).
      # Present now so the compose contract is stable.
      REDIS_URL: redis://redis:6379/0
      POSTGRES_DSN: postgresql://maav:maav@postgres:5432/maav
      # Phase 6: JWT signing secret for /chat auth. Set a real one in prod —
      # this default is dev-only and must not be reused anywhere real.
      JWT_SIGNING_SECRET: ${JWT_SIGNING_SECRET:-dev-only-change-me}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-}
    depends_on:
      redis:
        condition: service_started
      postgres:
        condition: service_healthy

  # Its own service: holds Sarvam/Azure keys, is the only thing that talks to
  # them, and is where audio validation + (Phase 5) barge-in coordination
  # happen — see docs/speech_to_speech_implementation_plan.md §2.
  speech-gateway:
    build:
      context: ./backend
      dockerfile: Dockerfile.gateway
    ports:
      - "9100:9100"
    environment:
      SARVAM_API_KEY: ${SARVAM_API_KEY:-}
      AZURE_SPEECH_KEY: ${AZURE_SPEECH_KEY:-}
      AZURE_SPEECH_REGION: ${AZURE_SPEECH_REGION:-}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-}

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: maav
      POSTGRES_PASSWORD: maav
      POSTGRES_DB: maav
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U maav"]
      interval: 5s
      timeout: 3s
      retries: 5
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
