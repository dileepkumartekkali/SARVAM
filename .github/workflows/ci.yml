name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend-tests:
    name: Backend tests + eval suite
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: backend/pyproject.toml
      - name: Install backend
        working-directory: backend
        run: pip install -e ".[dev]"
      - name: Run full test suite (includes the prompt-compliance eval, deterministic tier)
        working-directory: backend
        run: pytest -q
      # No provider keys in CI — the live-model eval tier
      # (test_live_model_compliance) is intentionally skipped here. It's a
      # separate, opt-in job below, gated to prompt-template changes.

  prompt-eval-live:
    name: Live prompt-compliance eval (prompt template changes only)
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Check whether prompts/** changed
        id: changed
        run: |
          git fetch origin ${{ github.base_ref }} --depth=1
          if git diff --name-only origin/${{ github.base_ref }}...HEAD | grep -q '^prompts/'; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi
      - uses: actions/setup-python@v5
        if: steps.changed.outputs.changed == 'true'
        with:
          python-version: "3.12"
      - name: Install backend
        if: steps.changed.outputs.changed == 'true'
        working-directory: backend
        run: pip install -e ".[dev]"
      - name: Run live-model eval against every supported language
        if: steps.changed.outputs.changed == 'true'
        working-directory: backend
        env:
          MAAV_EVAL_LIVE: "true"
          # Configure the actual provider secret(s) as repo/environment
          # secrets before enabling this job for real — not present in this
          # session, so this workflow is written but has never actually run
          # against a live model in CI.
          GROK_API_KEY: ${{ secrets.GROK_API_KEY }}
        run: pytest -q tests/eval/test_prompt_compliance_eval.py::test_live_model_compliance

  frontend-build:
    name: Frontend build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json
      - working-directory: frontend
        run: npm ci
      - working-directory: frontend
        run: npm run build

  docker-build:
    name: Build Docker images (backend + speech-gateway)
    runs-on: ubuntu-latest
    needs: [backend-tests]
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build backend image
        uses: docker/build-push-action@v5
        with:
          context: backend
          file: backend/Dockerfile
          push: false
          tags: maav-backend:ci
      - name: Build speech-gateway image
        uses: docker/build-push-action@v5
        with:
          context: backend
          file: backend/Dockerfile.gateway
          push: false
          tags: maav-speech-gateway:ci
